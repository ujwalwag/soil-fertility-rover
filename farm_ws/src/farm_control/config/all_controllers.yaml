controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true
    robot_description_param_name: robot_description
    
    # Controllers MUST be nested under controller_manager.ros__parameters
    # for spawner to find them automatically
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController
      left_wheel_names: ["wheel_left_joint"]
      right_wheel_names: ["wheel_right_joint"]
      wheel_separation: 0.287
      wheels_per_side: 1
      wheel_radius: 0.033
      publish_rate: 50.0
      odom_frame_id: odom
      base_frame_id: base_link
      open_loop: true
      enable_odom_tf: true
      cmd_vel_timeout: 0.5
      use_stamped_vel: false
      publish_cmd: true
      publish_odom: true
      odom_publish_period: 0.02
      cmd_vel_topic: cmd_vel
      odom_topic: odom
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
      joints: [joint1, joint2, joint3, joint4, gripper_left_joint, gripper_right_joint]
      command_interfaces: [position]
      state_interfaces: [position, velocity]
      state_publish_rate: 50.0
      action_monitor_rate: 20.0
